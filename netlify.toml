# Netlify configuration for ProfitPath (static Astro site)
# Deploy: connect this repo/branch in Netlify → it runs the build and serves ./dist.
# No adapter needed — this is a pure static build.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Analytics stays on by default. Ads stay OFF until AdSense approval — after
  # approval set PUBLIC_ADSENSE_ENABLED=true and PUBLIC_ADSENSE_CLIENT in the
  # Netlify UI (Site settings → Environment variables), then redeploy.

# Long-cache hashed, immutable build assets for speed.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Keep HTML fresh so content updates show up promptly.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Make sitemap and robots always served fresh.
[[headers]]
  for = "/sitemap-index.xml"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/xml"

# Reasonable, AdSense/Firebase-safe security headers (no strict CSP so ads and
# analytics load correctly).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
